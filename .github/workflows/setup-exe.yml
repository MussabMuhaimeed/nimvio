name: Build setup EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag for version + GitHub Release (e.g. v26.8.0).'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: nimvio-setup-${{ github.ref }}-${{ github.event.inputs.tag || 'none' }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-setup:
    name: Build setup EXE
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $createRelease = 'false'

          if ($env:GITHUB_REF -match '^refs/tags/(v.+)$') {
            # Tag push: code already matches the tag (must include packaging/)
            $tag = $Matches[1]
            $createRelease = 'true'
          }
          elseif (-not [string]::IsNullOrWhiteSpace('${{ inputs.tag }}')) {
            $tag = '${{ inputs.tag }}'.Trim()
            if ($tag -notmatch '^v') { $tag = "v$tag" }

            $ref = git rev-parse --verify "refs/tags/$tag" 2>$null
            if (-not $ref) {
              throw @"
Tag '$tag' was not found (deleted or never pushed).

Remote tags:
  git ls-remote --tags origin refs/tags/v*

Recreate:
  git tag $tag <commit-sha>
  git push origin $tag
"@
            }

            # Keep the selected BRANCH tree (has Nimvio.iss). Use tag only for version + release.
            if (-not (Test-Path .\packaging\Nimvio.iss)) {
              throw 'packaging/Nimvio.iss missing. Run this workflow from a branch that includes the setup installer files.'
            }

            $createRelease = 'true'
            Write-Host "Building current branch code; version/release from tag $tag"
          }
          else {
            $tag = "v0.0.$env:GITHUB_RUN_NUMBER"
            if (-not (Test-Path .\packaging\Nimvio.iss)) {
              throw 'packaging/Nimvio.iss missing on this branch.'
            }
          }

          $appVersion = $tag.TrimStart('v', 'V')
          if ($appVersion -notmatch '^\d+(\.\d+){1,3}$') {
            throw "Invalid version '$appVersion' (from tag '$tag')"
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "app_version=$appVersion" >> $env:GITHUB_OUTPUT
          "create_release=$createRelease" >> $env:GITHUB_OUTPUT
          Write-Host "Setup version: $appVersion (tag=$tag, create_release=$createRelease)"

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish application
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\publish\setup-app, .\dist | Out-Null
          dotnet publish .\Nimvio.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o .\publish\setup-app

          if (-not (Test-Path .\publish\setup-app\Nimvio.exe)) {
            throw 'Publish did not produce Nimvio.exe'
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Compile setup EXE
        shell: pwsh
        run: |
          $iscc = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $iscc) {
            throw 'ISCC.exe not found after installing Inno Setup'
          }

          & $iscc `
            .\packaging\Nimvio.iss `
            "/DMyAppVersion=$($env:APP_VERSION)"

          if ($LASTEXITCODE -ne 0) {
            throw "ISCC failed with exit code $LASTEXITCODE"
          }

          Get-ChildItem .\dist\*.exe | ForEach-Object { Write-Host "Built $($_.FullName)" }
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}

      - name: Upload setup artifact
        uses: actions/upload-artifact@v7
        with:
          name: Nimvio-Setup-${{ steps.version.outputs.app_version }}
          path: dist/Nimvio-Setup-*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Attach setup to GitHub release
        if: steps.version.outputs.create_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Nimvio ${{ steps.version.outputs.tag }}
          make_latest: true
          generate_release_notes: true
          files: dist/Nimvio-Setup-*.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
