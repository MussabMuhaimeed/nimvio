name: Build setup EXE

on:
  workflow_run:
    workflows: ['Build and release Nimvio']
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag for version + GitHub Release (e.g. v26.8.0).'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: nimvio-setup-${{ github.event.workflow_run.head_sha || github.ref }}-${{ github.event.inputs.tag || 'none' }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-setup:
    name: Build setup EXE
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $createRelease = 'false'

          if ($env:GITHUB_EVENT_NAME -eq 'workflow_run') {
            $sha = '${{ github.event.workflow_run.head_sha }}'
            $tag = git describe --tags --exact-match --match 'v*' $sha 2>$null
            if (-not $tag) {
              $tag = git tag -l 'v*' --points-at $sha | Select-Object -First 1
            }
            if (-not $tag) {
              throw "No release tag found at commit $sha"
            }

            if (-not (Test-Path .\packaging\Nimvio.iss)) {
              throw 'packaging/Nimvio.iss missing at tagged commit.'
            }

            $createRelease = 'true'
            Write-Host "Attaching setup to existing release $tag ($sha)"
          }
          elseif (-not [string]::IsNullOrWhiteSpace('${{ inputs.tag }}')) {
            $tag = '${{ inputs.tag }}'.Trim()
            if ($tag -notmatch '^v') { $tag = "v$tag" }

            $ref = git rev-parse --verify "refs/tags/$tag" 2>$null
            if (-not $ref) {
              throw "Tag '$tag' was not found (deleted or never pushed). List tags with: git ls-remote --tags origin refs/tags/v*"
            }

            if (-not (Test-Path .\packaging\Nimvio.iss)) {
              throw 'packaging/Nimvio.iss missing. Run this workflow from a branch that includes the setup installer files.'
            }

            $createRelease = 'true'
            Write-Host "Building current branch code; version/release from tag $tag"
          }
          else {
            $tag = 'v' + (& .\scripts\Get-AppVersion.ps1)
            if (-not (Test-Path .\packaging\Nimvio.iss)) {
              throw 'packaging/Nimvio.iss missing on this branch.'
            }
            Write-Host "Manual run; using git tag version $tag"
          }

          $appVersion = $tag.TrimStart('v', 'V')
          if ($appVersion -notmatch '^\d+(\.\d+){1,3}$') {
            throw "Invalid version '$appVersion' (from tag '$tag')"
          }

          $setupName = "Nimvio-Setup-$appVersion.exe"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "app_version=$appVersion" >> $env:GITHUB_OUTPUT
          "setup_name=$setupName" >> $env:GITHUB_OUTPUT
          "create_release=$createRelease" >> $env:GITHUB_OUTPUT
          Write-Host "Setup version: $appVersion (tag=$tag, file=$setupName, create_release=$createRelease)"

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore unit tests
        shell: pwsh
        run: dotnet restore .\Nimvio.Tests\Nimvio.Tests.csproj --configfile .\NuGet.Config

      - name: Build unit tests
        shell: pwsh
        run: dotnet build .\Nimvio.Tests\Nimvio.Tests.csproj -c Release --no-restore

      - name: Run unit tests
        shell: pwsh
        run: dotnet test .\Nimvio.Tests\Nimvio.Tests.csproj -c Release --no-build --no-restore --logger "trx;LogFileName=nimvio-tests.trx" --results-directory .\TestResults

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: setup-test-results-${{ github.run_id }}
          path: TestResults/*.trx
          if-no-files-found: error
          retention-days: 30

      - name: Publish application
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\publish\setup-app, .\dist | Out-Null
          $version = '${{ steps.version.outputs.app_version }}'
          # Stamp the same git-tag version into the binary (About page) and the setup EXE.
          dotnet publish .\Nimvio.App\Nimvio.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=$version `
            -p:InformationalVersion=$version `
            -p:SkipGitVersion=true `
            -o .\publish\setup-app

          if (-not (Test-Path .\publish\setup-app\Nimvio.exe)) {
            throw 'Publish did not produce Nimvio.exe'
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Compile setup EXE
        shell: pwsh
        run: |
          $iscc = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $iscc) {
            throw 'ISCC.exe not found after installing Inno Setup'
          }

          & $iscc `
            .\packaging\Nimvio.iss `
            "/DMyAppVersion=$($env:APP_VERSION)"

          if ($LASTEXITCODE -ne 0) {
            throw "ISCC failed with exit code $LASTEXITCODE"
          }

          Get-ChildItem .\dist\*.exe | ForEach-Object { Write-Host "Built $($_.FullName)" }
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}

      - name: Upload setup artifact
        uses: actions/upload-artifact@v7
        with:
          name: Nimvio-Setup-${{ steps.version.outputs.app_version }}
          path: dist/Nimvio-Setup-*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Attach setup to GitHub release
        if: steps.version.outputs.create_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          append_body: true
          generate_release_notes: false
          body: |
            ### Windows installer

            Download **${{ steps.version.outputs.setup_name }}** below for a guided per-user Windows setup (Inno Setup).
          files: dist/Nimvio-Setup-*.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
