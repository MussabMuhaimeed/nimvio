name: Build MSIX for Microsoft Store

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-msix:
    name: Build MSIX package
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore unit tests
        shell: pwsh
        run: dotnet restore .\Nimvio.Tests\Nimvio.Tests.csproj --configfile .\NuGet.Config

      - name: Build unit tests
        shell: pwsh
        run: dotnet build .\Nimvio.Tests\Nimvio.Tests.csproj -c Release --no-restore

      - name: Run unit tests
        shell: pwsh
        run: dotnet test .\Nimvio.Tests\Nimvio.Tests.csproj -c Release --no-build --no-restore --logger "trx;LogFileName=nimvio-tests.trx" --results-directory .\TestResults

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: msix-test-results-${{ github.run_id }}
          path: TestResults/*.trx
          if-no-files-found: error
          retention-days: 30

      - name: Publish Windows application
        shell: pwsh
        run: |
          dotnet publish .\Nimvio.App\Nimvio.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o .\publish\app

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $version = $env:GITHUB_REF_NAME
          }
          else {
            $version = "0.0.$env:GITHUB_RUN_NUMBER.0"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Package version: $version"

      - name: Pack MSIX
        shell: pwsh
        run: |
          .\scripts\Pack-Msix.ps1 `
            -PublishDir .\publish\app `
            -OutputMsix .\publish\Nimvio.msix `
            -Version '${{ steps.version.outputs.version }}'

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: Nimvio-MSIX-${{ github.ref_name }}
          path: publish/Nimvio.msix
          if-no-files-found: error
          retention-days: 30
