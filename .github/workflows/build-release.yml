name: Build and release Nimvio

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v26.8.0). Leave empty to use the latest v* tag.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: nimvio-release-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-release:
    name: Build Windows package and create release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/(v.+)$') {
            $tag = $Matches[1]
          }
          elseif (-not [string]::IsNullOrWhiteSpace('${{ inputs.tag }}')) {
            $tag = '${{ inputs.tag }}'.Trim()
          }
          else {
            $tag = git tag -l 'v*' --sort=-v:refname | Select-Object -First 1
            if ([string]::IsNullOrWhiteSpace($tag)) {
              throw 'No v* tags found. Push a tag first (e.g. v26.8.0) or pass a tag input.'
            }
          }

          if ($tag -notmatch '^v') {
            throw "Tag must start with 'v' (got: $tag)"
          }

          git checkout --force "refs/tags/$tag"
          $sha = git rev-parse HEAD
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "sha=$sha" >> $env:GITHUB_OUTPUT
          Write-Host "Release tag: $tag ($sha)"

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore unit tests
        shell: pwsh
        run: dotnet restore .\nimvio.tests\Nimvio.Tests.csproj --configfile .\NuGet.Config

      - name: Build unit tests
        shell: pwsh
        run: dotnet build .\nimvio.tests\Nimvio.Tests.csproj -c Release --no-restore

      - name: Run unit tests
        shell: pwsh
        run: dotnet test .\nimvio.tests\Nimvio.Tests.csproj -c Release --no-build --no-restore --logger "trx;LogFileName=nimvio-tests.trx" --results-directory .\TestResults

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-test-results-${{ steps.version.outputs.tag }}
          path: TestResults/*.trx
          if-no-files-found: error
          retention-days: 30

      - name: Restore dependencies
        shell: pwsh
        run: dotnet restore .\Nimvio.csproj --configfile .\NuGet.Config

      - name: Build
        shell: pwsh
        run: dotnet build .\Nimvio.csproj -c Release --no-restore

      - name: Publish Windows application
        shell: pwsh
        run: |
          $package = Join-Path $env:RUNNER_TEMP 'Nimvio-Windows'
          $app = Join-Path $package 'app'
          New-Item -ItemType Directory -Force -Path $app | Out-Null

          dotnet publish .\Nimvio.csproj `
            -c Release `
            --no-restore `
            --no-self-contained `
            -o $app

          Copy-Item .\Install.cmd, .\Uninstall.cmd, .\install.ps1, .\uninstall.ps1 -Destination $package
          Copy-Item .\README.md -Destination $package
          Copy-Item .\assets -Destination $package -Recurse

          Compress-Archive `
            -Path (Join-Path $package '*') `
            -DestinationPath .\Nimvio-Windows.zip `
            -CompressionLevel Optimal `
            -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: Nimvio-Windows-${{ steps.version.outputs.tag }}
          path: Nimvio-Windows.zip
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Nimvio ${{ steps.version.outputs.tag }}
          make_latest: true
          generate_release_notes: true
          body: |
            Nimvio ${{ steps.version.outputs.tag }}

            Commit: ${{ steps.version.outputs.sha }}
          files: Nimvio-Windows.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
